[pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = tests.py test_*.py *_tests.py
testpaths = apps core infrastructure tests
# Do not reuse the database by default. Transactional tests can flush tenant
# schemas without replaying RunPython seed migrations, so a later reused-DB run
# reports false failures across AI, reports, notifications, and other seeded apps.
addopts = --strict-markers
filterwarnings =
    ignore::DeprecationWarning
markers =
    integration: tests that hit the database / external services
    slow: > ~2s (tenant provisioning, PDF generation); excluded from quick runs
    channels: websocket tests (transaction=True, asyncio)
    minio: storage tests against a live MinIO (compose); auto-skipped when unreachable
