[pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = tests.py test_*.py *_tests.py
testpaths = apps core infrastructure tests
addopts = --strict-markers --reuse-db
filterwarnings =
    ignore::DeprecationWarning
markers =
    integration: tests that hit the database / external services
    slow: > ~2s (tenant provisioning, PDF generation); excluded from quick runs
    channels: websocket tests (transaction=True, asyncio)
    minio: storage tests against a live MinIO (compose); auto-skipped when unreachable
