name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4
        with:
          version: "0.11.x"
      - run: uv sync --all-groups --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - name: Reject untranslated API/domain errors
        run: uv run python scripts/check_i18n.py

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4
        with:
          version: "0.11.x"
      - run: uv sync --all-groups --frozen
      - run: uv run mypy apps core infrastructure config

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4
        with:
          version: "0.11.x"
      - run: uv sync --all-groups --frozen
      - name: Reject dependencies with known vulnerabilities
        run: uv run pip-audit --local --strict

  container-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate production shell scripts
        run: bash -n docker/entrypoint.sh scripts/backup_production.sh scripts/deploy_production.sh scripts/verify_restore.sh
      - name: Build the production image
        run: docker build --tag starforge-ci:${{ github.sha }} --file docker/Dockerfile .
      - name: Validate native PDF and push dependencies
        run: |
          docker run --rm --entrypoint python starforge-ci:${{ github.sha }} -c "import firebase_admin; from weasyprint import HTML; assert HTML(string='<p>ok</p>').write_pdf()[:4] == b'%PDF'"
      - name: Run Django production deployment checks
        run: |
          docker run --rm --entrypoint python \
            -e SECRET_KEY='ci-only-production-check-secret-key-0000000000000000000000000000' \
            -e ALLOWED_HOSTS='example.invalid' \
            -e FIELD_ENCRYPTION_KEY='MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=' \
            -e NUM_PROXIES='1' \
            -e DATABASE_URL='postgres://ci:ci@127.0.0.1:5432/ci' \
            -e REDIS_URL='redis://127.0.0.1:6379/0' \
            -e AWS_STORAGE_BUCKET_NAME='ci' \
            -e AWS_S3_ENDPOINT_URL='https://storage.example.invalid' \
            -e AWS_S3_ACCESS_KEY_ID='ci' \
            -e AWS_S3_SECRET_ACCESS_KEY='ci-only' \
            -e AWS_S3_REGION_NAME='us-east-1' \
            -e EMAIL_HOST='smtp.example.invalid' \
            -e ESKIZ_EMAIL='ci@example.invalid' \
            -e ESKIZ_PASSWORD="$GITHUB_RUN_ID" \
            -e ESKIZ_FROM='ci' \
            -e ANTHROPIC_API_KEY='ci-only' \
            -e SOLIQ_API_URL='https://soliq.example.invalid' \
            -e SOLIQ_API_TOKEN='ci-only' \
            -e FCM_CREDENTIALS_FILE='/run/secrets/firebase.json' \
            starforge-ci:${{ github.sha }} manage.py check --deploy --fail-level WARNING

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: starforge
          POSTGRES_USER: starforge
          POSTGRES_PASSWORD: starforge
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U starforge"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgres://starforge:starforge@localhost:5432/starforge
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: "ci-only-not-secret"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4
        with:
          version: "0.11.x"
      - run: uv sync --all-groups --frozen
      # D4-LF-2: compile the uz/en/ru gettext catalogs so activate("uz") resolves
      # translated strings in the suite. The Linux runner has GNU gettext (the
      # Windows dev box does not — locale/*/LC_MESSAGES/django.mo are committed,
      # built by scripts/build_locale.py; compilemessages refreshes them from the
      # committed .po here as the authoritative step).
      - run: sudo apt-get update && sudo apt-get install -y gettext
      - run: uv run python manage.py compilemessages -l uz -l en -l ru
      - run: uv run python manage.py check
      # TD-20 coverage floor: 70 after Day 1 → 80 after Day 3 → 85 after Day 5.
      # Raising this number is the EOD duty of D1-A / D3-F / D5-B respectively.
      - run: uv run pytest -q --cov=apps --cov=core --cov-fail-under=70

  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4
        with:
          version: "0.11.x"
      - run: uv sync --all-groups --frozen
      - name: Generate OpenAPI schema
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          SECRET_KEY: "ci-only-not-secret"
          DATABASE_URL: "postgres://x:x@localhost:5432/x"
          REDIS_URL: "redis://localhost:6379/0"
        run: uv run python scripts/export_openapi.py --validate
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: openapi
          path: |
            openapi.yaml
            openapi-public.yaml
