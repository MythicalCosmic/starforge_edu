[mypy]
python_version = 3.13
plugins = mypy_django_plugin.main, mypy_drf_plugin.main
ignore_missing_imports = True
# Third-party libs without type stubs (dateutil, weasyprint, icalendar, magic, …)
# are treated as Any rather than flagged — consistent with ignore_missing_imports
# and avoids inline-ignore churn that flip-flops with the incremental cache.
disable_error_code = import-untyped
warn_unused_ignores = True
check_untyped_defs = True
disallow_untyped_defs = False
exclude = (^|/)migrations/

# Test modules are not type-checked: they lean on factory-boy's dynamic
# attributes (django-stubs types `Factory()` as the factory, not the model),
# which produces noise without catching real bugs. Runtime correctness is
# covered by the test suite itself.
[mypy-apps.*.tests.*]
ignore_errors = True

[mypy-tests.*]
ignore_errors = True

[mypy-conftest]
ignore_errors = True

[mypy.plugins.django-stubs]
django_settings_module = config.settings.development
