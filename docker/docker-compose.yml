# Local dev stack. Subdomain routing works against *.localhost on most
# modern OSes (resolves to 127.0.0.1 by default). Add the demo tenant via
# `docker compose run --rm web python scripts/seed_dev.py`.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: starforge
      POSTGRES_USER: starforge
      POSTGRES_PASSWORD: starforge
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starforge"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    volumes:
      - minio_data:/data

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: starforge:dev
    command: ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000", "--reload", "--access-logfile", "-", "--access-logformat", "%(h)s %(m)s %(s)s %(L)s"]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgres://starforge:starforge@postgres:5432/starforge
      REDIS_URL: redis://redis:6379/0
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_S3_ACCESS_KEY_ID: minioadmin
      AWS_S3_SECRET_ACCESS_KEY: minioadmin
      ALLOWED_HOSTS: "*"
      SECRET_KEY: "dev-only-not-secret"
      ESKIZ_USE_MOCK: "True"
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ..:/app

  daphne:
    image: starforge:dev
    command: ["daphne", "-b", "0.0.0.0", "-p", "8001", "config.asgi:application"]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgres://starforge:starforge@postgres:5432/starforge
      REDIS_URL: redis://redis:6379/0
      ALLOWED_HOSTS: "*"
      SECRET_KEY: "dev-only-not-secret"
    ports: ["8001:8001"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ..:/app

  celery-worker:
    image: starforge:dev
    command: ["celery", "-A", "config", "worker", "--loglevel=info", "--concurrency=4"]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgres://starforge:starforge@postgres:5432/starforge
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: "dev-only-not-secret"
      ESKIZ_USE_MOCK: "True"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ..:/app

  celery-beat:
    image: starforge:dev
    command: ["celery", "-A", "config", "beat", "--loglevel=info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgres://starforge:starforge@postgres:5432/starforge
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: "dev-only-not-secret"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ..:/app

volumes:
  pg_data:
  redis_data:
  minio_data:
